nodes:
  - id: prompt
    node: dm-text-input
    outputs:
      - value
    config:
      label: "Prompt"
      placeholder: "Type something..."
      multiline: true

  - id: reserve
    node: dm-text-reserve
    inputs:
      text: prompt/value
    outputs:
      - text

  - id: message
    node: dm-message
    inputs:
      message: reserve/text
    config:
      label: "Reserved Output"
      render: text
