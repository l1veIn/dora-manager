nodes:
  - id: prompt
    node: dm-input
    outputs:
      - text
    config:
      label: "Prompt"
      widgets:
        text:
          type: textarea
          label: "User Prompt"
          placeholder: "Type something..."

  - id: echo
    node: dora-echo
    inputs:
      text: prompt/text
    outputs:
      - text

  - id: display
    node: dm-display
    inputs:
      data: echo/text
    config:
      label: "Echo Output"
      render: text
      tail: true
