nodes:
  - id: dora-microphone
    node: dora-microphone
    inputs:
      tick: dora/timer/millis/2000
    outputs:
      - audio

  - id: dora-vad
    node: dora-vad
    inputs:
      audio: dora-microphone/audio
    outputs:
      - audio

  - id: screen
    node: dm-test-media-capture
    inputs:
      trigger: dora-vad/audio
    outputs:
      - image
      - meta
    config:
      mode: screenshot
      output_format: png

  - id: screen-video
    node: dm-test-media-capture
    inputs:
      trigger: dora-vad/audio
    outputs:
      - video
      - meta
    config:
      mode: record_clip
      clip_duration_sec: 5
      output_format: mp4

  # Live screen capture for MJPEG preview (1 fps)
  - id: screen-live
    node: dm-test-media-capture
    outputs:
      - image
    config:
      mode: repeat_screenshot
      output_format: png
      interval_sec: 1

  - id: dora-distil-whisper
    node: dora-distil-whisper
    inputs:
      text_noise: dora-qwen/text
      input: dora-vad/audio
    outputs:
      - text
    env:
      TARGET_LANGUAGE: english

  - id: dora-qwen
    node: dora-qwen
    inputs:
      text: dora-distil-whisper/text
    outputs:
      - text

  - id: dora-kokoro-tts
    node: dora-kokoro-tts
    inputs:
      text: dora-qwen/text
    outputs:
      - audio
    env:
      ACTIVATION_WORDS: you

  # Aggregate TTS audio chunks into a complete asset before Panel
  - id: tts-queue
    node: dm-queue
    inputs:
      data: dora-kokoro-tts/audio
      tick: dora/timer/millis/500
    outputs:
      - flushed
    config:
      max_size_bytes: 52428800
      max_size_time: 0
      flush_on: signal
      flush_timeout: 2000000000

  # MJPEG live preview endpoint at http://localhost:4567/stream
  - id: preview
    node: dm-mjpeg
    inputs:
      frame: screen-live/image
    config:
      port: 4567
      quality: 75
      max_fps: 1

  - id: panel
    node: dm-panel
    inputs:
      audio_vad: dora-vad/audio
      audio_tts: tts-queue/flushed
      screenshot: screen/image
      screenshot_meta: screen/meta
      video_clip: screen-video/video
      video_clip_meta: screen-video/meta
      text_qwen: dora-qwen/text
      text_whisper: dora-distil-whisper/text
    outputs:
      - prompt
      - system_prompt
      - model
      - temperature
      - stream
      - output_format
      - save_path
      - work_dir
      - tools
      - generate
      - clear_history
    widgets:
      generate:
        x-widget:
          span: 6
          type: button
          label: "Generate"
          value: "run"
          hotkey: "ctrl+enter"
      clear_history:
        x-widget:
          span: 6
          type: button
          label: "Clear History"
          variant: destructive
          value: "clear"
          hotkey: "ctrl+shift+x"
      prompt:
        default: "hello"
        x-widget:
          span: 6 
          type: input
          label: "User Prompt"
          placeholder: "Enter your message..."
      system_prompt:
        default: "You are a helpful assistant."
        x-widget:
          span: 6
          type: textarea
          label: "System Prompt"
          placeholder: "Set system prompt..."
      model:
        default: "qwen-turbo"
        x-widget:
          span: 4
          type: select
          label: "Model"
          options:
            - qwen-turbo
            - qwen-plus
            - qwen-max
      temperature:
        default: 0.7
        x-widget:
          span: 4
          type: slider
          label: "Temperature"
          min: 0
          max: 2
          step: 0.1
      stream:
        default: "true"
        x-widget:
          span: 4
          type: switch
          label: "Stream"
      output_format:
        default: "text"
        x-widget:
          span: 6
          type: radio
          label: "Output Format"
          options:
            - text
            - json
            - markdown
      tools:
        x-widget:
          span: 6
          type: checkbox
          label: "Enabled Tools"
          options:
            - web_search
            - code_exec
            - file_read
      save_path:
        x-widget:
          span: 6
          type: file
          label: "Save Path"
      work_dir:
        x-widget:
          span: 6
          type: directory
          label: "Working Dir"
