nodes:
  - id: input
    node: dm-input
    outputs:
      - enabled
      - device_id
    config:
      label: "Microphone Settings"
      widgets:
        enabled:
          type: switch
          label: "Enable Microphone"
          default: false
        device_id:
          type: input
          label: "Type Device ID or 'default'"
          default: "default"

  - id: devicelist-display
    node: dm-display
    inputs:
      data: dm-microphone/devices
    config:
      label: "Available Microphones"
      render: json
      tail: false

  - id: dm-microphone
    node: dm-microphone
    inputs:
      enabled: input/enabled
      device_id: input/device_id
    outputs:
      - audio
      - devices

  - id: dora-vad
    node: dora-vad
    inputs:
      audio: dm-microphone/audio
    outputs:
      - audio

  - id: screen
    node: dm-test-media-capture
    inputs:
      trigger: dora-vad/audio
    outputs:
      - image
      - meta
    config:
      mode: screenshot
      output_format: png

  - id: screen-save
    node: dm-save
    inputs:
      data: screen/image
    outputs:
      - path
    config:
      dir: artifacts/screenshots
      naming: latest
      extension: png
      overwrite_latest: true

  - id: screen-display
    node: dm-display
    inputs:
      path: screen-save/path
    config:
      label: "Latest Screenshot"
      render: image
      tail: false

  - id: screen-video
    node: dm-test-media-capture
    inputs:
      trigger: dora-vad/audio
    outputs:
      - video
      - meta
    config:
      mode: record_clip
      clip_duration_sec: 5
      output_format: mp4

  - id: screen-video-save
    node: dm-save
    inputs:
      data: screen-video/video
    outputs:
      - path
    config:
      dir: artifacts/clips
      extension: mp4
      max_files: 5

  - id: screen-video-display
    node: dm-display
    inputs:
      path: screen-video-save/path
    config:
      label: "Latest Screen Clip"
      render: video
      tail: false

  # Live screen capture for MJPEG preview (1 fps)
  - id: screen-live
    node: dm-test-media-capture
    outputs:
      - image
    config:
      mode: repeat_screenshot
      output_format: png
      interval_sec: 1

  - id: dora-distil-whisper
    node: dora-distil-whisper
    inputs:
      text_noise: dora-qwen/text
      input: dora-vad/audio
    outputs:
      - text
    env:
      TARGET_LANGUAGE: english

  - id: transcript-log
    node: dm-log
    inputs:
      data: dora-distil-whisper/text
    outputs:
      - path
    config:
      path: transcripts/whisper.log
      format: text

  - id: transcript-display
    node: dm-display
    inputs:
      data: dora-distil-whisper/text
    config:
      label: "Whisper Transcript"
      render: text
      tail: true

  - id: dora-qwen
    node: dora-qwen
    inputs:
      text: dora-distil-whisper/text
    outputs:
      - text

  - id: response-log
    node: dm-log
    inputs:
      data: dora-qwen/text
    outputs:
      - path
    config:
      path: transcripts/qwen.log
      format: text

  - id: response-display
    node: dm-display
    inputs:
      data: dora-qwen/text
    config:
      label: "Qwen Reply"
      render: text
      tail: true

  - id: dora-kokoro-tts
    node: dora-kokoro-tts
    inputs:
      text: dora-qwen/text
    outputs:
      - audio
    env:
      ACTIVATION_WORDS: you

  - id: tts-record
    node: dm-recorder
    inputs:
      data: dora-kokoro-tts/audio
    outputs:
      - path
    config:
      path: audio/reply.wav
      sample_rate: 24000

  - id: tts-display
    node: dm-display
    inputs:
      path: tts-record/path
    config:
      label: "TTS Reply"
      render: audio
      tail: false

  # Aggregate TTS audio chunks into a complete asset for audio playback/debugging
  - id: tts-queue
    node: dm-queue
    inputs:
      data: dora-kokoro-tts/audio
      tick: dora/timer/millis/500
    outputs:
      - flushed
    config:
      max_size_bytes: 52428800
      max_size_time: 0
      flush_on: signal
      flush_timeout: 2000000000

  # MJPEG live preview endpoint at http://localhost:4567/stream
  - id: preview
    node: dm-mjpeg
    inputs:
      frame: screen-live/image
    config:
      port: 4567
      quality: 75
      max_fps: 1
