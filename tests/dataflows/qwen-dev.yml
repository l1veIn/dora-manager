nodes:
  - id: mic-enabled
    node: dm-input-switch
    outputs:
      - value
    config:
      label: "Enable Microphone"
      default_value: "false"

  - id: mic-device-id
    node: dm-text-input
    outputs:
      - value
    config:
      label: "Device ID"
      default_value: "default"
      placeholder: "Type Device ID or 'default'"

  - id: devicelist-display
    node: dm-display
    inputs:
      data: dm-microphone/devices
    config:
      label: "Available Microphones"
      render: json

  - id: dm-microphone
    node: dm-microphone
    inputs:
      enabled: mic-enabled/value
      device_id: mic-device-id/value
    outputs:
      - audio
      - devices

  - id: dora-vad
    node: dora-vad
    inputs:
      audio: dm-microphone/audio
    outputs:
      - audio

  - id: screen
    node: dm-test-media-capture
    inputs:
      trigger: dora-vad/audio
    outputs:
      - image
      - meta
    config:
      mode: screenshot
      output_format: png

  - id: screen-save
    node: dm-save
    inputs:
      data: screen/image
    outputs:
      - path
    config:
      dir: artifacts/screenshots
      naming: latest
      extension: png
      overwrite_latest: true

  - id: screen-display
    node: dm-display
    inputs:
      path: screen-save/path
    config:
      label: "Latest Screenshot"
      render: image

  - id: screen-video
    node: dm-test-media-capture
    inputs:
      trigger: dora-vad/audio
    outputs:
      - video
      - meta
    config:
      mode: record_clip
      clip_duration_sec: 5
      output_format: mp4

  - id: screen-video-save
    node: dm-save
    inputs:
      data: screen-video/video
    outputs:
      - path
    config:
      dir: artifacts/clips
      extension: mp4
      max_files: 5

  - id: screen-video-display
    node: dm-display
    inputs:
      path: screen-video-save/path
    config:
      label: "Latest Screen Clip"
      render: video

  # Live screen stream via dm-server media backend
  - id: screen-live-ffmpeg-ready
    node: dm-check-ffmpeg
    outputs:
      - ok
    config:
      mode: repeat
      interval_sec: 10

  - id: screen-live-media-ready
    node: dm-check-media-backend
    outputs:
      - ok
    config:
      mode: repeat
      interval_sec: 10

  - id: screen-live-ready
    node: dm-and
    inputs:
      a: screen-live-ffmpeg-ready/ok
      b: screen-live-media-ready/ok
    outputs:
      - ok
    config:
      expected_inputs: "a,b"

  - id: screen-live-gate
    node: dm-gate
    inputs:
      enabled: screen-live-ready/ok
      value: dora/timer/millis/1000
    outputs:
      - value

  - id: screen-live
    node: dm-screen-capture
    inputs:
      trigger: screen-live-gate/value
    outputs:
      - frame
    config:
      mode: triggered
      output_format: png
      width: 1280
      height: 720

  - id: screen-live-publish
    node: dm-stream-publish
    inputs:
      frame: screen-live/frame
    outputs:
      - stream_id
      - meta
    config:
      label: "Live Screen"
      fps: 5
      stream_name: live

  - id: dora-distil-whisper
    node: dora-distil-whisper
    inputs:
      text_noise: dora-qwen/text
      input: dora-vad/audio
    outputs:
      - text
    env:
      TARGET_LANGUAGE: english

  - id: transcript-log
    node: dm-log
    inputs:
      data: dora-distil-whisper/text
    outputs:
      - path
    config:
      path: transcripts/whisper.log
      format: text

  - id: transcript-display
    node: dm-display
    inputs:
      data: dora-distil-whisper/text
    config:
      label: "Whisper Transcript"
      render: text

  - id: dora-qwen
    node: dora-qwen
    inputs:
      text: dora-distil-whisper/text
    outputs:
      - text

  - id: response-log
    node: dm-log
    inputs:
      data: dora-qwen/text
    outputs:
      - path
    config:
      path: transcripts/qwen.log
      format: text

  - id: response-display
    node: dm-display
    inputs:
      data: dora-qwen/text
    config:
      label: "Qwen Reply"
      render: text

  - id: dora-kokoro-tts
    node: dora-kokoro-tts
    inputs:
      text: dora-qwen/text
    outputs:
      - audio
    env:
      ACTIVATION_WORDS: you

  - id: tts-record
    node: dm-recorder
    inputs:
      data: dora-kokoro-tts/audio
    outputs:
      - path
    config:
      path: audio/reply.wav
      sample_rate: 24000

  - id: tts-display
    node: dm-display
    inputs:
      path: tts-record/path
    config:
      label: "TTS Reply"
      render: audio

  # Aggregate TTS audio chunks into a complete asset for audio playback/debugging
  - id: tts-queue
    node: dm-queue
    inputs:
      data: dora-kokoro-tts/audio
      tick: dora/timer/millis/500
    outputs:
      - flushed
    config:
      max_size_bytes: 52428800
      max_size_time: 0
      flush_on: signal
      flush_timeout: 2000000000
