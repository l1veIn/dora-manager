nodes:
  - id: dm-microphone
    node: dm-microphone
    inputs:
      tick: dora/timer/millis/2000
    outputs:
      - audio
      - devices

  - id: dora-vad
    node: dora-vad
    inputs:
      audio: dm-microphone/audio
    outputs:
      - audio

  - id: screen
    node: dm-test-media-capture
    inputs:
      trigger: dora-vad/audio
    outputs:
      - image
      - meta
    config:
      mode: screenshot
      output_format: png

  - id: screen-video
    node: dm-test-media-capture
    inputs:
      trigger: dora-vad/audio
    outputs:
      - video
      - meta
    config:
      mode: record_clip
      clip_duration_sec: 5
      output_format: mp4

  # Live screen capture for MJPEG preview (1 fps)
  - id: screen-live
    node: dm-test-media-capture
    outputs:
      - image
    config:
      mode: repeat_screenshot
      output_format: png
      interval_sec: 1

  - id: dora-distil-whisper
    node: dora-distil-whisper
    inputs:
      text_noise: dora-qwen/text
      input: dora-vad/audio
    outputs:
      - text
    env:
      TARGET_LANGUAGE: english

  - id: dora-qwen
    node: dora-qwen
    inputs:
      text: dora-distil-whisper/text
    outputs:
      - text

  - id: dora-kokoro-tts
    node: dora-kokoro-tts
    inputs:
      text: dora-qwen/text
    outputs:
      - audio
    env:
      ACTIVATION_WORDS: you

  # Aggregate TTS audio chunks into a complete asset before Panel
  - id: tts-queue
    node: dm-queue
    inputs:
      data: dora-kokoro-tts/audio
      tick: dora/timer/millis/500
    outputs:
      - flushed
    config:
      max_size_bytes: 52428800
      max_size_time: 0
      flush_on: signal
      flush_timeout: 2000000000

  # MJPEG live preview endpoint at http://localhost:4567/stream
  - id: preview
    node: dm-mjpeg
    inputs:
      frame: screen-live/image
    config:
      port: 4567
      quality: 75
      max_fps: 1
