nodes:
  # Test dm-downloader with a small public file
  - id: dl-test
    node: dm-downloader
    inputs:
      tick: dora/timer/millis/2000
    outputs:
      - path
      - ui
    config:
      url: "https://raw.githubusercontent.com/dora-rs/dora/main/README.md"
      hash: ""
      extract: false
      dest: "test/dora-readme.md"
